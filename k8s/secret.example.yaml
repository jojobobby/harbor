# EXAMPLE ONLY — do NOT commit a real secret. Harbor's admin password and the 16-char
# encryption key are referenced by the chart via `existingSecretAdminPassword` /
# `existingSecretSecretKey` (both point at the `harbor-core-secret` Secret below).
#
# Create one per namespace BEFORE/at first sync (ArgoCD ignoreDifferences leaves the
# Secret's /data alone afterwards). Generate strong values, e.g.:
#
#   ADMIN=$(openssl rand -base64 24)
#   KEY=$(openssl rand -hex 8)         # exactly 16 chars
#
# Dev namespace:
#   kubectl create namespace harbor-development
#   kubectl -n harbor-development create secret generic harbor-core-secret \
#     --from-literal=HARBOR_ADMIN_PASSWORD="$ADMIN" \
#     --from-literal=secretKey="$KEY"
#
# Prod namespace:
#   kubectl create namespace harbor-production
#   kubectl -n harbor-production create secret generic harbor-core-secret \
#     --from-literal=HARBOR_ADMIN_PASSWORD="$ADMIN" \
#     --from-literal=secretKey="$KEY"
#
# Or apply a manifest shaped like this (values are placeholders):
apiVersion: v1
kind: Secret
metadata:
  name: harbor-core-secret
  namespace: harbor-development # change to harbor-production for prod
type: Opaque
stringData:
  HARBOR_ADMIN_PASSWORD: "change-me-strong-admin-password"
  secretKey: "0123456789abcdef" # MUST be exactly 16 characters
